name: tests

on:
  push:
  pull_request:

jobs:
  bats:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Bash syntax check
        run: |
          for file in harden-audit.sh lib/*.sh checks/*.sh; do
            bash -n "$file"
          done

      - name: Run Bats tests
        run: bats tests
